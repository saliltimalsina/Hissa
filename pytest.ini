[pytest]
# Run from the repo root: `BulkCLI/.venv/bin/pytest`
# testpaths keeps discovery scoped to the backend suite; pythonpath puts BulkCLI
# on sys.path so `import server` and `import src.*` resolve the same way the app
# does at runtime (server.py inserts its own dir + src/ onto sys.path too).
testpaths = BulkCLI/tests
pythonpath = BulkCLI
asyncio_mode = auto
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
