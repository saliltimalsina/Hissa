databases:
  - name: hissa-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"

services:
  - type: web
    name: hissa-api
    runtime: python
    region: singapore
    plan: free
    rootDir: BulkCLI
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/brokers
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: hissa-db
          property: connectionString
      - key: NCAP_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://hissa.vercel.app
