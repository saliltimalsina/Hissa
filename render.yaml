services:
  - type: web
    name: hissa-api
    runtime: python
    region: singapore
    plan: free
    rootDir: BulkCLI
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/brokers
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://hissa.vercel.app
