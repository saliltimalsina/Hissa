name: keep-backend-warm

# Pings the Fly backend so its machine doesn't auto-stop (auto_stop_machines).
# Note: GitHub cron can be delayed a few minutes, and scheduled workflows are
# auto-disabled after 60 days with no repo activity.
on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch: {}       # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit health endpoint
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://hissa-api.fly.dev/api/brokers)
          echo "health -> $code"
          # Don't fail the workflow on a single cold-start hiccup.
          if [ "$code" != "200" ]; then
            echo "::warning::backend returned $code (may have been a cold start)"
          fi
