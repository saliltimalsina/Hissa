# Fly.io config for the Hissa API (FastAPI).
# App name is set on first `fly launch`; edit if you pick a different name.
app = "hissa-api"
primary_region = "sin"  # Singapore — closest to Nepal users

[build]

[http_service]
  internal_port = 8080
  force_https = true
  # Free-tier friendly: scale to zero when idle, wake on request.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [http_service.checks]
    [[http_service.checks.health]]
      method = "GET"
      path = "/api/brokers"
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
